env_file = ".env"

[settings.ruby]
compile = false

[tools]
# Source of truth for this repo's shared toolchain.
# Explicit exception: deploy may temporarily use .client_notes/.ruby-version
# when invoking client_notes-related build steps.
ruby = "4.0.2"
node = "22.6.0"
python = "3.12.0"
pandoc = "3.9.0.2"
terraform = "1.14.6"
awscli = "2.34.1"
hk = "1.42.0"
pitchfork = "2.6.0"
caddy = "2.11.2"

[tasks.setup]
description = "Install dependencies and git hooks"
run = '''
bundle install
npm install --ignore-scripts
hk install
mise_path="$(command -v mise)"
cat > .git/hooks/pre-commit <<'EOF'
#!/bin/sh
test "${HK:-1}" = "0" || exec "__MISE_PATH__" exec -- hk run pre-commit "$@"
EOF
MISE_PATH="$mise_path" python - <<'PY'
import os
from pathlib import Path
path = Path('.git/hooks/pre-commit')
path.write_text(path.read_text().replace('__MISE_PATH__', os.environ['MISE_PATH']))
PY
chmod +x .git/hooks/pre-commit
'''

[tasks.build]
description = "Build the site"
run = "bundle exec jekyll build"

[tasks.dev]
description = "Start the local development stack and follow logs"
depends = ["build"]
run = "pitchfork start -l --force && pitchfork logs jekyll static worker --tail"

[tasks."dev:bg"]
description = "Start the local development stack in the background"
depends = ["build"]
run = "pitchfork start -l --force"

[tasks."dev:stop"]
description = "Stop the local development stack"
run = "pitchfork stop jekyll static worker"

[tasks.lint]
description = "Run all linters"
run = "bundle exec standardrb"

[tasks."test:quick"]
description = "Run the fast local test suite"
run = "bundle exec rake test"

[tasks."test:ruby"]
description = "Run Ruby unit tests"
run = "bundle exec rake test"

[tasks."test:browser"]
description = "Run Playwright browser tests"
depends = ["test:ruby"]
run = "npm test"

[tasks."test:integration"]
description = "Run integration tests against local Cloudflare worker"
depends = ["test:links"]
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -e

cleanup() {
  echo "Cleaning up..."
  pkill -f 'caddy run --config Caddyfile' 2>/dev/null || true
  pkill -f 'wrangler dev --config workers/wrangler.toml --port 8787' 2>/dev/null || true
}
trap cleanup EXIT

# Start static file server with local HTTPS and HTTP/2
printf 'Starting Caddy static server...\n'
caddy run --config Caddyfile > /tmp/caddy.log 2>&1 &

for i in {1..20}; do
  if curl --silent --show-error --output /dev/null https://localhost:4000/ 2>/dev/null; then
    echo "Caddy ready"
    break
  fi
  echo "Waiting for Caddy... ($i)"
  sleep 1
done

# Verify local HTTPS + HTTP/2
http_version=$(curl --silent --show-error --output /dev/null --write-out '%{http_version}' --http2 https://localhost:4000/)
if [ "$http_version" != "2" ]; then
  echo "Error: Expected HTTP/2 from local Caddy server, got HTTP/$http_version"
  cat /tmp/caddy.log
  exit 1
fi

# Start Cloudflare worker using local node_modules
echo "Starting Cloudflare worker..."
./node_modules/.bin/wrangler dev --config workers/wrangler.toml --port 8787 > /tmp/wrangler.log 2>&1 &

# Wait for wrangler to be ready
for i in {1..20}; do
  if curl --silent --show-error --output /dev/null http://localhost:8787/ 2>/dev/null; then
    echo "Wrangler ready"
    break
  fi
  echo "Waiting for wrangler... ($i)"
  sleep 1
done

# Verify servers are running
if ! curl --silent --show-error --output /dev/null https://localhost:4000/ 2>/dev/null; then
  echo "Error: Caddy not responding"
  cat /tmp/caddy.log
  exit 1
fi

if ! curl --silent --show-error --output /dev/null http://localhost:8787/ 2>/dev/null; then
  echo "Error: Wrangler not responding"
  cat /tmp/wrangler.log
  exit 1
fi

echo "Running integration tests..."
BASE_URL=http://localhost:8787 bundle exec ruby test/integration/site_test.rb
"""

[tasks."test:integration:prod"]
description = "Run integration tests against production"
run = "BASE_URL=https://www.speedshop.co bundle exec ruby test/integration/site_test.rb"

[tasks."test:links"]
description = "Run built-site link integrity checks"
depends = ["test:browser"]
run = "bundle exec rake test:links"

[tasks.test]
description = "Run all tests and linters"
depends = ["test:integration"]

[tasks."test:ci"]
description = "Run tests for CI (no local workers)"
depends = ["test:links"]
