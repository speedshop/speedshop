title: Speedshop - Ruby on Rails performance consulting
email: nate.berkopec@speedshop.co
lang: en
locale: en_US
author:
  name: Nate Berkopec
  url: https://www.nateberkopec.com/
twitter:
  username: nateberkopec
structured_data:
  site_name: Speedshop
  blog_name: The Speedshop Ruby on Rails Performance Blog
  blog_description: Ruby on Rails performance articles from Speedshop about profiling, optimization, scaling, memory, and web performance.
description: >
  Speedshop is a Ruby on Rails performance consultancy that
  optimizes the full stack - frontend, backend and environment - to generate
  revenue and cut scaling costs for businesses on Rails. Fast sites are
  profitable sites. Speed is a feature.
baseurl: ""
url: "https://www.speedshop.co"
collections:
  posts:
    permalink: "blog/:title/"
plugins:
  - jekyll-sitemap
markdown: kramdown
kramdown:
  auto_ids: true
encoding: utf-8
vertical_debug: false
exclude:
   - _scripts
   - client_notes
   - .client_notes
   - card
   - wercker.yml
   - Gemfile
   - Gemfile.lock
   - assets/js/main.js
   - assets/js/viz/core.js
   - mise.toml
   - mise.lock
   - wrangler.toml
   - test
   - tmp
   - AGENTS.md
   - main.tf
   - variables.tf
   - versions.tf
   - infra
   - infra/**
   - workers
   - workers/**
   - Rakefile
   - package.json
   - package-lock.json
   - playwright.config.cjs
   - Caddyfile
   - hk.pkl
   - pitchfork.toml
   - node_modules
   - .terraform
