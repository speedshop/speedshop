name: Deploy

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        repository: speedshop/client_notes
        token: ${{ secrets.CLIENT_NOTES_PAT }}
        path: .client_notes
    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        install_args: --locked ruby node pandoc awscli
    - name: Determine deploy Ruby source
      id: deploy_ruby
      run: |
        ruby_version=$(awk -F'"' '/^ruby = / { print $2 }' mise.toml)
        ruby_source=mise.toml

        if [ -f .client_notes/.ruby-version ]; then
          ruby_version=$(tr -d '\n' < .client_notes/.ruby-version)
          ruby_source=.client_notes/.ruby-version
        fi

        echo "Using Ruby $ruby_version from $ruby_source"
        echo "value=$ruby_version" >> "$GITHUB_OUTPUT"
        echo "source=$ruby_source" >> "$GITHUB_OUTPUT"
    - name: Install client_notes Ruby exception
      if: ${{ steps.deploy_ruby.outputs.source == '.client_notes/.ruby-version' }}
      run: mise install ruby@${{ steps.deploy_ruby.outputs.value }}
    - name: Install PDF system dependencies (explicit exception; see #94)
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-xetex librsvg2-bin
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.client_notes/.ruby-version') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: npm ci
      run: npm ci
    - name: Bundle install
      run: |
        mise exec ruby@${{ steps.deploy_ruby.outputs.value }} -- bundle config path vendor/bundle
        mise exec ruby@${{ steps.deploy_ruby.outputs.value }} -- bundle install --jobs 4 --retry 3
    - name: Validate repo Ruby version
      if: ${{ steps.deploy_ruby.outputs.source == 'mise.toml' }}
      run: mise exec ruby@${{ steps.deploy_ruby.outputs.value }} -- bundle exec rake validate:ruby_version
    - name: Build site
      env:
        CLIENT_NOTES_PATH: .client_notes
      run: mise exec ruby@${{ steps.deploy_ruby.outputs.value }} -- bundle exec jekyll build
    - name: Validate generated data
      run: mise exec ruby@${{ steps.deploy_ruby.outputs.value }} -- bundle exec rake validate:generated_data
    - name: Deploy to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: 'us-east-1'
        S3_BUCKET: 'www.speedshop.co'
      run: mise exec ruby@${{ steps.deploy_ruby.outputs.value }} -- bundle exec ruby _scripts/s3_deploy.rb
    - name: Deploy card directory to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: 'us-east-1'
      run: aws s3 sync card/ s3://www.speedshop.co/card/ --cache-control "max-age=86400"
    - name: Cloudflare Purge Cache
      uses: jakejarvis/cloudflare-purge-action@eee6dba0236093358f25bb1581bd615dc8b3d8e3 # v0.3.0
      env:
        CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
        CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
    - name: Report scheduled deploy to Dead Man's Snitch
      if: ${{ always() && github.event_name == 'schedule' }}
      env:
        DEAD_MANS_SNITCH_URL: https://nosnch.in/447fc8972e
        JOB_STATUS: ${{ job.status }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        status=1
        if [ "$JOB_STATUS" = "success" ]; then
          status=0
        fi

        if ! curl --fail --silent --show-error \
          --data-urlencode "s=$status" \
          --data-urlencode "m=deploy $JOB_STATUS: $RUN_URL" \
          "$DEAD_MANS_SNITCH_URL" >/dev/null; then
          echo "::warning::Dead Man's Snitch check-in failed"
        fi
