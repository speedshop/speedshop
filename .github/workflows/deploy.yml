name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        repository: speedshop/client_notes
        token: ${{ secrets.CLIENT_NOTES_PAT }}
        path: .client_notes
    - name: Determine Ruby version for deploy
      id: ruby_version
      run: |
        ruby_version_file=.ruby-version
        if [ -f .client_notes/.ruby-version ]; then
          ruby_version_file=.client_notes/.ruby-version
        fi

        version=$(tr -d '\n' < "$ruby_version_file")
        echo "value=$(printf '%s' "$version" | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"
    - uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
      with:
        ruby-version: ${{ steps.ruby_version.outputs.value }}
    - uses: r-lib/actions/setup-pandoc@929c772977a3a13c8733b363bf5a2f685c25dd91 # v2.9.0
      with:
        pandoc-version: '2.9.2.1'
    - name: Install PDF dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-xetex librsvg2-bin
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb # v1.12.1
    - name: Bundle install
      run: |
        bundle config path vendor/bundle
        bundle install --jobs 4 --retry 3
    - name: Validate Ruby version
      run: bundle exec rake validate:ruby_version
    - name: Build site
      env:
        CLIENT_NOTES_PATH: .client_notes
      run: bundle exec jekyll build
    - name: Validate generated data
      run: bundle exec rake validate:generated_data
    - name: Deploy to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: 'us-east-1'
        S3_BUCKET: 'www.speedshop.co'
      run: bundle exec ruby _scripts/s3_deploy.rb
    - name: Deploy card directory to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: 'us-east-1'
      run: aws s3 sync card/ s3://www.speedshop.co/card/ --cache-control "max-age=86400"
    - name: Cloudflare Purge Cache
      uses: jakejarvis/cloudflare-purge-action@eee6dba0236093358f25bb1581bd615dc8b3d8e3 # v0.3.0
      env:
        CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
        CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
    - name: Report scheduled deploy to Dead Man's Snitch
      if: ${{ always() && github.event_name == 'schedule' }}
      env:
        DEAD_MANS_SNITCH_URL: https://nosnch.in/447fc8972e
        JOB_STATUS: ${{ job.status }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        status=1
        if [ "$JOB_STATUS" = "success" ]; then
          status=0
        fi

        if ! curl --fail --silent --show-error \
          --data-urlencode "s=$status" \
          --data-urlencode "m=deploy $JOB_STATUS: $RUN_URL" \
          "$DEAD_MANS_SNITCH_URL" >/dev/null; then
          echo "::warning::Dead Man's Snitch check-in failed"
        fi
