name: Deploy

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  DEVCONTAINER_IMAGE: speedshop-devcontainer
  DEVCONTAINER_PLATFORM: linux/amd64

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        repository: speedshop/client_notes
        token: ${{ secrets.CLIENT_NOTES_PAT }}
        path: .client_notes
    - name: Determine deploy Ruby source
      id: deploy_ruby
      run: |
        ruby_version=$(awk -F'"' '/^ruby = / { print $2 }' mise.toml)
        ruby_source=mise.toml

        if [ -f .client_notes/.ruby-version ]; then
          ruby_version=$(tr -d '\n' < .client_notes/.ruby-version)
          ruby_source=.client_notes/.ruby-version
        fi

        echo "Using Ruby $ruby_version from $ruby_source"
        echo "value=$ruby_version" >> "$GITHUB_OUTPUT"
        echo "source=$ruby_source" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.client_notes/.ruby-version', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Build canonical container
      run: docker build --platform "$DEVCONTAINER_PLATFORM" -f .devcontainer/Dockerfile -t "$DEVCONTAINER_IMAGE" .
    - name: Deploy site
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
        CLIENT_NOTES_PATH: .client_notes
        DEPLOY_RUBY: ${{ steps.deploy_ruby.outputs.value }}
        DEPLOY_RUBY_SOURCE: ${{ steps.deploy_ruby.outputs.source }}
        S3_BUCKET: www.speedshop.co
      run: |
        mkdir -p "$RUNNER_TEMP/speedshop-home"

        docker run --rm \
          --platform "$DEVCONTAINER_PLATFORM" \
          --user "$(id -u):$(id -g)" \
          -e AWS_ACCESS_KEY_ID \
          -e AWS_SECRET_ACCESS_KEY \
          -e AWS_DEFAULT_REGION \
          -e BUNDLE_PATH=vendor/bundle \
          -e CLIENT_NOTES_PATH \
          -e DEPLOY_RUBY \
          -e DEPLOY_RUBY_SOURCE \
          -e HOME=/tmp/speedshop-home \
          -e S3_BUCKET \
          -v "$PWD:/workspaces/speedshop" \
          -v "$RUNNER_TEMP/speedshop-home:/tmp/speedshop-home" \
          -w /workspaces/speedshop \
          "$DEVCONTAINER_IMAGE" \
          bash -lc '
            set -euo pipefail
            mise trust --yes /workspaces/speedshop/mise.toml
            mise install ruby@${DEPLOY_RUBY}
            mise install --locked node pandoc awscli
            mise exec ruby@${DEPLOY_RUBY} -- bash -lc "npm ci && bundle install --jobs 4 --retry 3"

            if [ "${DEPLOY_RUBY_SOURCE}" = "mise.toml" ]; then
              mise exec ruby@${DEPLOY_RUBY} -- bundle exec rake validate:ruby_version
            fi

            mise exec ruby@${DEPLOY_RUBY} -- bundle exec jekyll build
            mise exec ruby@${DEPLOY_RUBY} -- bundle exec rake validate:generated_data
            mise exec ruby@${DEPLOY_RUBY} -- bundle exec ruby _scripts/s3_deploy.rb
            mise exec ruby@${DEPLOY_RUBY} -- aws s3 sync card/ s3://www.speedshop.co/card/ --cache-control "max-age=86400"
          '
    - name: Cloudflare Purge Cache
      uses: jakejarvis/cloudflare-purge-action@eee6dba0236093358f25bb1581bd615dc8b3d8e3 # v0.3.0
      env:
        CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
        CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
    - name: Report scheduled deploy to Dead Man's Snitch
      if: ${{ always() && github.event_name == 'schedule' }}
      env:
        DEAD_MANS_SNITCH_URL: https://nosnch.in/447fc8972e
        JOB_STATUS: ${{ job.status }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        status=1
        if [ "$JOB_STATUS" = "success" ]; then
          status=0
        fi

        if ! curl --fail --silent --show-error \
          --data-urlencode "s=$status" \
          --data-urlencode "m=deploy $JOB_STATUS: $RUN_URL" \
          "$DEAD_MANS_SNITCH_URL" >/dev/null; then
          echo "::warning::Dead Man's Snitch check-in failed"
        fi
