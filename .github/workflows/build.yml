name: Build

on:
  pull_request:

permissions:
  contents: read

env:
  DEVCONTAINER_IMAGE: speedshop-devcontainer
  DEVCONTAINER_PLATFORM: linux/amd64

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Build canonical container
      run: docker build --platform "$DEVCONTAINER_PLATFORM" -f .devcontainer/Dockerfile -t "$DEVCONTAINER_IMAGE" .
    - name: Run linter
      run: |
        mkdir -p "$RUNNER_TEMP/speedshop-home"

        docker run --rm \
          --platform "$DEVCONTAINER_PLATFORM" \
          --user "$(id -u):$(id -g)" \
          -e BUNDLE_PATH=vendor/bundle \
          -e HOME=/tmp/speedshop-home \
          -v "$PWD:/workspaces/speedshop" \
          -v "$RUNNER_TEMP/speedshop-home:/tmp/speedshop-home" \
          -w /workspaces/speedshop \
          "$DEVCONTAINER_IMAGE" \
          bash -lc '
            set -euo pipefail
            mise trust --yes /workspaces/speedshop/mise.toml
            mise install ruby
            mise exec -- bash -lc "bundle install --jobs 4 --retry 3"
            mise run lint
          '

  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Build canonical container
      run: docker build --platform "$DEVCONTAINER_PLATFORM" -f .devcontainer/Dockerfile -t "$DEVCONTAINER_IMAGE" .
    - name: Build site
      run: |
        mkdir -p "$RUNNER_TEMP/speedshop-home"

        docker run --rm \
          --platform "$DEVCONTAINER_PLATFORM" \
          --user "$(id -u):$(id -g)" \
          -e BUNDLE_PATH=vendor/bundle \
          -e HOME=/tmp/speedshop-home \
          -v "$PWD:/workspaces/speedshop" \
          -v "$RUNNER_TEMP/speedshop-home:/tmp/speedshop-home" \
          -w /workspaces/speedshop \
          "$DEVCONTAINER_IMAGE" \
          bash -lc '
            set -euo pipefail
            mise trust --yes /workspaces/speedshop/mise.toml
            mise install ruby
            mise install --locked node pandoc
            mise exec -- bash -lc "npm ci && bundle install --jobs 4 --retry 3 && bundle exec jekyll build"
          '

  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Build canonical container
      run: docker build --platform "$DEVCONTAINER_PLATFORM" -f .devcontainer/Dockerfile -t "$DEVCONTAINER_IMAGE" .
    - name: Run CI test suite
      run: |
        mkdir -p "$RUNNER_TEMP/speedshop-home"

        docker run --rm \
          --platform "$DEVCONTAINER_PLATFORM" \
          --user "$(id -u):$(id -g)" \
          -e BUNDLE_PATH=vendor/bundle \
          -e CI=true \
          -e HOME=/tmp/speedshop-home \
          -v "$PWD:/workspaces/speedshop" \
          -v "$RUNNER_TEMP/speedshop-home:/tmp/speedshop-home" \
          -w /workspaces/speedshop \
          "$DEVCONTAINER_IMAGE" \
          bash -lc '
            set -euo pipefail
            mise trust --yes /workspaces/speedshop/mise.toml
            mise install ruby
            mise install --locked node pandoc
            mise exec -- bash -lc "npm ci && bundle install --jobs 4 --retry 3 && npx --no-install playwright install chromium && mise run test:ci"
          '
