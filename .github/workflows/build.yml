name: Build

on:
  pull_request:

permissions:
  contents: read

env:
  DEVCONTAINER_IMAGE: speedshop-devcontainer
  DEVCONTAINER_PLATFORM: linux/amd64
  CANONICAL_ENV_HOME: ${{ github.workspace }}/.cache/canonical-home

jobs:
  prepare:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - name: Ensure image cache directory exists
      run: mkdir -p .cache/canonical-image
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      id: canonical_image_cache
      with:
        path: .cache/canonical-image/${{ env.DEVCONTAINER_IMAGE }}.tar.gz
        key: ${{ runner.os }}-canonical-image-v1-${{ hashFiles('mise.toml', 'mise.lock', '.devcontainer/Dockerfile') }}
    - name: Build and archive canonical container
      if: steps.canonical_image_cache.outputs.cache-hit != 'true'
      run: |
        docker build \
          --platform "$DEVCONTAINER_PLATFORM" \
          --build-arg "RUBY_VERSION=$(awk -F'"' '/^ruby = / { print $2; exit }' mise.toml)" \
          -f .devcontainer/Dockerfile \
          -t "$DEVCONTAINER_IMAGE" \
          .
        docker save "$DEVCONTAINER_IMAGE" | gzip > ".cache/canonical-image/${DEVCONTAINER_IMAGE}.tar.gz"
    - uses: actions/upload-artifact@v4
      with:
        name: canonical-image
        path: .cache/canonical-image/${{ env.DEVCONTAINER_IMAGE }}.tar.gz
        if-no-files-found: error

  lint:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/download-artifact@v4
      with:
        name: canonical-image
        path: .cache/canonical-image
    - name: Load canonical container
      run: gunzip -c ".cache/canonical-image/${DEVCONTAINER_IMAGE}.tar.gz" | docker load
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: .cache/canonical-home
        key: ${{ runner.os }}-canonical-home-v1-${{ hashFiles('mise.toml', 'mise.lock', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-canonical-home-v1-
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Run linter in canonical container
      run: |
        ./_scripts/canonical-env.sh '
          set -euo pipefail
          mise trust --yes /workspaces/speedshop/mise.toml
          mise exec -- bundle config set --global path /workspaces/speedshop/vendor/bundle
          mise exec -- bundle install --jobs 4 --retry 3
          mise run lint
        '

  build:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/download-artifact@v4
      with:
        name: canonical-image
        path: .cache/canonical-image
    - name: Load canonical container
      run: gunzip -c ".cache/canonical-image/${DEVCONTAINER_IMAGE}.tar.gz" | docker load
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: .cache/canonical-home
        key: ${{ runner.os }}-canonical-home-v1-${{ hashFiles('mise.toml', 'mise.lock', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-canonical-home-v1-
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Build site in canonical container
      run: |
        ./_scripts/canonical-env.sh '
          set -euo pipefail
          mise trust --yes /workspaces/speedshop/mise.toml
          mise exec -- bundle config set --global path /workspaces/speedshop/vendor/bundle
          mise install node pandoc
          mise exec -- npm ci
          mise exec -- bundle install --jobs 4 --retry 3
          mise exec -- bundle exec jekyll build
        '

  test:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/download-artifact@v4
      with:
        name: canonical-image
        path: .cache/canonical-image
    - name: Load canonical container
      run: gunzip -c ".cache/canonical-image/${DEVCONTAINER_IMAGE}.tar.gz" | docker load
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: .cache/canonical-home
        key: ${{ runner.os }}-canonical-home-v1-${{ hashFiles('mise.toml', 'mise.lock', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-canonical-home-v1-
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Run CI test suite in canonical container
      env:
        CI: true
      run: |
        ./_scripts/canonical-env.sh --env CI '
          set -euo pipefail
          mise trust --yes /workspaces/speedshop/mise.toml
          mise exec -- bundle config set --global path /workspaces/speedshop/vendor/bundle
          mise install node pandoc
          mise exec -- npm ci
          mise exec -- bundle install --jobs 4 --retry 3
          mise exec -- npx --no-install playwright install chromium
          mise run test:ci
        '
