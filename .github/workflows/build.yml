name: Build

on:
  pull_request:

permissions:
  contents: read

env:
  DEVCONTAINER_IMAGE: speedshop-devcontainer
  DEVCONTAINER_PLATFORM: linux/amd64
  CANONICAL_ENV_HOME: ${{ github.workspace }}/.cache/canonical-home

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: .cache/canonical-home
        key: ${{ runner.os }}-canonical-home-v1-${{ hashFiles('mise.toml', 'mise.lock', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-canonical-home-v1-
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Run linter in canonical container
      run: |
        ./_scripts/canonical-env.sh '
          set -euo pipefail
          mise trust --yes /workspaces/speedshop/mise.toml
          mise exec -- bundle config set --global path /workspaces/speedshop/vendor/bundle
          mise exec -- bundle install --jobs 4 --retry 3
          mise run lint
        '

  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: .cache/canonical-home
        key: ${{ runner.os }}-canonical-home-v1-${{ hashFiles('mise.toml', 'mise.lock', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-canonical-home-v1-
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Build site in canonical container
      run: |
        ./_scripts/canonical-env.sh '
          set -euo pipefail
          mise trust --yes /workspaces/speedshop/mise.toml
          mise exec -- bundle config set --global path /workspaces/speedshop/vendor/bundle
          mise install node pandoc
          mise exec -- npm ci
          mise exec -- bundle install --jobs 4 --retry 3
          mise exec -- bundle exec jekyll build
        '

  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: .cache/canonical-home
        key: ${{ runner.os }}-canonical-home-v1-${{ hashFiles('mise.toml', 'mise.lock', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-canonical-home-v1-
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Run CI test suite in canonical container
      env:
        CI: true
      run: |
        ./_scripts/canonical-env.sh --env CI '
          set -euo pipefail
          mise trust --yes /workspaces/speedshop/mise.toml
          mise exec -- bundle config set --global path /workspaces/speedshop/vendor/bundle
          mise install node pandoc
          mise exec -- npm ci
          mise exec -- bundle install --jobs 4 --retry 3
          mise exec -- npx --no-install playwright install chromium
          mise run test:ci
        '
