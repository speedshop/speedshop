name: Integration Tests

on:
  workflow_run:
    workflows: ["Deploy"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://www.speedshop.co'

permissions:
  contents: read

env:
  DEVCONTAINER_IMAGE: speedshop-devcontainer
  DEVCONTAINER_PLATFORM: linux/amd64

jobs:
  test:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock', 'mise.toml', '.devcontainer/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-
    - name: Run integration tests in canonical container
      env:
        BASE_URL: ${{ github.event.inputs.base_url || 'https://www.speedshop.co' }}
      run: |
        ./_scripts/canonical-env.sh --env BASE_URL '
          set -euo pipefail
          mise trust --yes /workspaces/speedshop/mise.toml
          mise install ruby
          mise exec -- bundle config set --global path /workspaces/speedshop/vendor/bundle
          mise exec -- bundle install --jobs 4 --retry 3
          mise exec -- bundle exec ruby test/integration/site_test.rb
        '
