name = "speedshop-local"
main = "agent-worker.js"
compatibility_date = "2024-01-01"

# Local development settings
[dev]
port = 8787
local_protocol = "http"

# For local dev, we need to proxy to the static site server
# The worker fetches over local HTTP while Caddy also serves HTTPS/HTTP2 on localhost.
[vars]
ORIGIN_URL = "http://localhost"
